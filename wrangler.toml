# Cloudflare Pages project configuration
# Deploy with: npx wrangler pages deploy public --project-name=starcitizen-catalog

name = "starcitizen-catalog"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "public"

# ---------------------------------------------------------------------------
# Bindings
# ---------------------------------------------------------------------------
# Create these once with wrangler, then paste the IDs below:
#   wrangler d1 create starcitizen-catalog
#   wrangler kv:namespace create SESSIONS
#   wrangler kv:namespace create API_KEYS
#   wrangler kv:namespace create RATELIMIT
#   wrangler vectorize create sc-catalog --dimensions=768 --metric=cosine
#
# Secrets (set with `wrangler pages secret put <NAME>`):
#   TWITCH_CLIENT_ID
#   TWITCH_CLIENT_SECRET
#   SESSION_SIGNING_KEY   (32+ random bytes, base64)
#   MASTER_KEY            (32+ random bytes, base64; envelope encryption root)
#   TURNSTILE_SECRET_KEY  (optional; pairs with the public TURNSTILE_SITE_KEY var below)
# ---------------------------------------------------------------------------

[vars]
APP_NAME = "Star Citizen Catalog"
APP_URL = "https://starcitizencatalog.oldmanobserver.com"
TWITCH_REDIRECT_URI = "https://starcitizencatalog.oldmanobserver.com/api/auth/callback"
SESSION_COOKIE_NAME = "scc_session"
SESSION_TTL_SECONDS = "2592000"   # 30 days
RATE_LIMIT_PER_HOUR = "120"
# Cloudflare Turnstile site key (public — safe to commit). Paired with the
# TURNSTILE_SECRET_KEY secret. Leave blank to disable the challenge.
TURNSTILE_SITE_KEY = "0x4AAAAAADQizMxpqErG3clY"

# Admin job dispatcher targets — these are not secrets, just configuration.
# The matching PAT lives in the GITHUB_DISPATCH_TOKEN secret.
GITHUB_OWNER = "oldmanobserver"
GITHUB_REPO = "starcitizen-catalog"
GITHUB_DEFAULT_BRANCH = "main"

[[d1_databases]]
binding = "DB"
database_name = "starcitizen-catalog"
database_id = "8e570bbe-0ebb-40d3-a5b3-dd3e2c2b5354"

[[kv_namespaces]]
binding = "SESSIONS"
id = "b9227de63f7e47b9b37dde20a43a11a1"

[[kv_namespaces]]
binding = "API_KEYS"
id = "1aa512e6b16f419ebbdb059248e14bd7"

[[kv_namespaces]]
binding = "RATELIMIT"
id = "d318c4a1f97a41c8b43403517b4e4898"

[[vectorize]]
binding = "VECTORIZE"
index_name = "sc-catalog"

[ai]
binding = "AI"
