name: Fetch new YouTube videos

# Triggers:
#   - Manual via the admin page or GitHub UI
#   - Weekly cron (Mondays 09:00 UTC). Runs against the current calendar year.
on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year to scan (defaults to current year)"
        required: false
        type: string
  schedule:
    - cron: "0 9 * * 1"

concurrency:
  group: fetch-videos
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Generous: 150s/transcript x potentially dozens of new videos.
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: functions/data/youtube/scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve target year
        id: year
        run: |
          if [ -n "${{ inputs.year }}" ]; then
            echo "value=${{ inputs.year }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u +%Y)" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch video metadata for ${{ steps.year.outputs.value }}
        working-directory: functions/data/youtube/scripts
        run: |
          python fetch_year.py ${{ steps.year.outputs.value }}

      - name: Build catalog + download new transcripts
        working-directory: functions/data/youtube/scripts
        run: |
          python build_year_catalog.py ${{ steps.year.outputs.value }}

      - name: Commit changes
        id: commit
        env:
          YEAR: ${{ steps.year.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/data/youtube/
          if git diff --cached --quiet; then
            echo "No new videos or transcripts."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "data: fetch new YouTube videos for ${YEAR}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node (for catalog sync)
        if: steps.commit.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync D1 catalog metadata
        if: steps.commit.outputs.changed == 'true'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          ACTOR: ${{ github.actor }}
        run: |
          node functions/ingest/sync_catalog.js

      - name: Incremental vector reindex
        if: steps.commit.outputs.changed == 'true'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          VECTORIZE_INDEX: sc-catalog
          API_KEYS_KV_ID: ${{ secrets.API_KEYS_KV_ID }}
        run: |
          node functions/ingest/build_index.js --incremental
