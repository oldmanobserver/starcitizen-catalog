name: Rebuild vector index

# Triggers:
#   - Manually from the Cloudflare admin page (workflow_dispatch via the GH API)
#   - Manually from the GitHub Actions UI
#   - Automatically on push to main when any data file changes
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Incremental (default, only re-embeds changed files) or full (re-embed everything)"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
  push:
    branches: [main]
    paths:
      - "functions/data/youtube/**/transcripts/**"
      - "functions/data/Patch Notes/**/*.md"
      - "functions/data/ships.json"
      - "functions/ingest/**"
      - "functions/lib/catalog.js"
      - "schema/migrations/**"

concurrency:
  group: rebuild-index
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Always apply any pending schema migrations FIRST so the rest of the
      # pipeline can rely on the latest tables existing. The applier is
      # idempotent — it tracks (name, sha1) in schema_migrations and re-runs
      # only what's actually new or changed. Statements that have already
      # been applied to D1 (duplicate column / table-already-exists) are
      # swallowed automatically so the first run after adopting the tracker
      # works on a pre-existing database.
      - name: Apply D1 migrations
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          node functions/ingest/apply_migrations.js

      # Catalog sync writes catalog_videos, catalog_patches, catalog_ship_*,
      # catalog_text_fts (the FTS5 lexical index) and the system:ship_aliases
      # KV mirror. Runs BEFORE the vector rebuild so the chat UI has updated
      # metadata even if Vectorize is slow.
      - name: Sync D1 catalog metadata
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          API_KEYS_KV_ID: ${{ secrets.API_KEYS_KV_ID }}
          ACTOR: ${{ github.actor }}
        run: |
          node functions/ingest/sync_catalog.js

      - name: Run vector ingest (${{ inputs.mode || 'incremental' }})
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          VECTORIZE_INDEX: sc-catalog
          API_KEYS_KV_ID: ${{ secrets.API_KEYS_KV_ID }}
          MODE: ${{ inputs.mode || 'incremental' }}
        run: |
          if [ "$MODE" = "full" ]; then
            node functions/ingest/build_index.js --full
          else
            node functions/ingest/build_index.js --incremental
          fi
