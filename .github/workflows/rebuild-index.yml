name: Rebuild vector index

# Triggers:
#   - Manually from the Cloudflare admin page (workflow_dispatch via the GH API)
#   - Manually from the GitHub Actions UI
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Incremental (default, only re-embeds changed files) or full (re-embed everything)"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - full

concurrency:
  group: rebuild-index
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run ingest (${{ inputs.mode || 'incremental' }})
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          VECTORIZE_INDEX: sc-catalog
          API_KEYS_KV_ID: ${{ secrets.API_KEYS_KV_ID }}
          MODE: ${{ inputs.mode || 'incremental' }}
        run: |
          if [ "$MODE" = "full" ]; then
            node functions/ingest/build_index.js --full
          else
            node functions/ingest/build_index.js --incremental
          fi

      - name: Sync D1 catalog metadata
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          ACTOR: ${{ github.actor }}
        run: |
          node functions/ingest/sync_catalog.js
