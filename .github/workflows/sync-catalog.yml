name: Sync catalog metadata

# Fast (~30s) D1 sync of the structured catalog tables (catalog_videos +
# catalog_patches). Does NOT touch Vectorize. Run any time transcripts or
# patch notes change to keep "latest" queries accurate without a full reindex.

on:
  workflow_dispatch: {}
  # NOTE: do NOT add a push trigger here. The `rebuild-index.yml` workflow
  # already runs `functions/ingest/sync_catalog.js` as its first step on
  # every qualifying push, so adding a push trigger to this workflow causes
  # both workflows to race on the same DELETE + INSERT statements and the
  # second one fails with `UNIQUE constraint failed: catalog_videos.video_id`.
  # Keep this workflow manual-only — use it when you want a catalog refresh
  # without paying for a full Vectorize rebuild.

concurrency:
  # Share the rebuild-index group so a manual catalog sync can't race against
  # the catalog-sync step inside an in-flight rebuild-index run.
  group: rebuild-index
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Idempotent: applies any new files under schema/migrations/ that haven't
      # already been recorded in the schema_migrations tracker table.
      - name: Apply D1 migrations
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          node functions/ingest/apply_migrations.js

      - name: Sync D1 catalog
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          # Optional: mirror the ship-alias map into KV so the worker can detect
          # ship-mention intents without a D1 round-trip. The build_index job
          # already uses this secret for the ingest manifest.
          API_KEYS_KV_ID: ${{ secrets.API_KEYS_KV_ID }}
          ACTOR: ${{ github.actor }}
        run: |
          node functions/ingest/sync_catalog.js
