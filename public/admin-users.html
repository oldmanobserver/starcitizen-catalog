<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Users — Star Citizen Catalog</title>
  <link rel="stylesheet" href="/assets/css/app.css">
  <script src="/assets/js/theme.js"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/app.html">Star Citizen Catalog</a>
    <div class="spacer"></div>
    <div class="h-stack">
      <img id="user-avatar" class="avatar" alt="">
      <span class="muted small" id="user-name"></span>
      <a class="btn ghost small" href="/admin.html">&larr; Admin home</a>
      <a class="btn ghost small" href="/app.html">Back to chat</a>
      <button class="btn ghost small" id="logout-btn">Log out</button>
    </div>
  </header>

  <main class="page" style="max-width: 900px">
    <h1>Admin · Registered users</h1>
    <p class="muted small">
      Everyone who has signed in via Twitch. Search matches login, display name, or email.
    </p>

    <section class="card" style="margin-top: 16px">
      <div class="h-stack" style="gap: 8px">
        <input id="users-q" type="text" placeholder="Search by login, display name, or email" style="flex: 1">
        <button class="btn primary" id="users-search">Search</button>
        <button class="btn ghost small" id="users-clear">Clear</button>
      </div>
      <div id="users-summary" class="muted small" style="margin-top: 10px"></div>
      <div id="users-table" style="margin-top: 8px"></div>
      <div class="h-stack" id="users-pager" style="justify-content: space-between; margin-top: 10px; display: none">
        <button class="btn ghost small" id="users-prev">&larr; Previous</button>
        <span class="muted small" id="users-page-label"></span>
        <button class="btn ghost small" id="users-next">Next &rarr;</button>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>
  <script type="module" src="/assets/js/admin-users.js"></script>
</body>
</html>
